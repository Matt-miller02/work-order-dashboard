name: Refresh Work Order Dashboard

on:
  schedule:
    # Runs every weekday at noon UTC = 6 AM Mountain
    # AppFolio sends the email at ~10:17 UTC (4:17 AM Mountain), plenty of buffer
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Also allows manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Run refresh script
        env:
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python refresh_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "Dashboard Bot"
          git config user.email "bot@thesitusgroup.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard refresh $(date -u +'%Y-%m-%d')"
          git push
